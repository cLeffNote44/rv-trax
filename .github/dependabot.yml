version: 2

updates:
  # Root package.json (turbo, prettier, eslint)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dev-tools:
        patterns: ['turbo', 'prettier', 'eslint*', 'typescript']
    labels: ['dependencies']
    commit-message:
      prefix: 'chore(deps)'

  # Web app
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      next-react:
        patterns: ['next', 'react', 'react-dom', '@types/react*']
      testing:
        patterns: ['vitest', '@testing-library/*', 'playwright', 'jsdom']
      ui-libs:
        patterns: ['lucide-react', 'recharts', 'tailwindcss*', '@tailwindcss/*']
    labels: ['dependencies', 'web']
    commit-message:
      prefix: 'chore(deps-web)'

  # API
  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      fastify:
        patterns: ['fastify', 'fastify-plugin', '@fastify/*']
      database:
        patterns: ['drizzle-orm', 'postgres']
    labels: ['dependencies', 'api']
    commit-message:
      prefix: 'chore(deps-api)'

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ['dependencies', 'ci']
    commit-message:
      prefix: 'chore(ci)'
