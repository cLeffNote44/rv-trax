# Render Blueprint — RV Trax API Server
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: rv-trax-api
    runtime: node
    region: ohio # us-east, closest to Neon us-east-1
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @rv-trax/shared build && pnpm --filter @rv-trax/db build && pnpm --filter @rv-trax/api build
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 10000
      - key: DATABASE_URL
        sync: false # Set manually in Render dashboard
      - key: REDIS_URL
        sync: false # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false # Set to your Vercel URL
      - key: LOG_LEVEL
        value: info
