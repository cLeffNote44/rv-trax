# Render Blueprint — RV Trax API Server
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: rv-trax-api
    runtime: node
    region: ohio
    plan: free
    nodeVersion: '22'
    buildCommand: |
      corepack enable &&
      corepack prepare pnpm@9 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @rv-trax/shared build &&
      pnpm --filter @rv-trax/db build &&
      pnpm --filter @rv-trax/api build
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
