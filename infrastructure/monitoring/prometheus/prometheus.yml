global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: rv-trax-api
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: rv-trax-iot-ingest
    static_configs:
      - targets: ['iot-ingest:3002']
    metrics_path: /metrics
    scrape_interval: 15s
