services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: rvtrax-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rvtrax
      POSTGRES_PASSWORD: rvtrax_dev
      POSTGRES_DB: rvtrax
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rvtrax"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rvtrax-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: rvtrax-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquittodata:/mosquitto/data
    restart: unless-stopped

  chirpstack:
    image: chirpstack/chirpstack:4
    container_name: rvtrax-chirpstack
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      POSTGRESQL__DSN: postgres://rvtrax:rvtrax_dev@postgres:5432/chirpstack?sslmode=disable
      REDIS__SERVERS: redis://redis:6379
      MQTT__SERVER: tcp://mosquitto:1883
    volumes:
      - ./chirpstack/chirpstack.toml:/etc/chirpstack/chirpstack.toml
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  mosquittodata:
